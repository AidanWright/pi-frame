<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-frame</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>pi-frame</h1>
    <div id="dot" class="dot offline" title="API connection status"></div>
  </div>
  <form class="key-form" onsubmit="connectWithKey(event)">
    <label for="key-input">API key</label>
    <input type="password" id="key-input" placeholder="Enter key…" autocomplete="current-password">
    <button type="submit" class="btn btn-primary">Connect</button>
  </form>
</header>

<main>
  <div id="upload-zone" class="upload-zone">
    <p>Drop images here or <span class="browse" id="browse-trigger">browse files</span></p>
    <p style="font-size:0.75rem;margin-top:0.25rem">JPEG, PNG, WebP, GIF accepted</p>
  </div>
  <input type="file" id="file-input" accept="image/*" multiple style="display:none">

  <div id="progress" class="upload-progress"></div>

  <div class="toolbar">
    <button class="btn btn-push" id="push-daily-btn" onclick="pushToFrame(null)">
      Push today's image to frame
    </button>
    <span class="toolbar-right" id="img-count"></span>
  </div>

  <div class="gallery" id="gallery">
    <div class="empty"><p>Enter your API key above to get started.</p></div>
  </div>
</main>

<div id="toast-container"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
